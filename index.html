<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOLO</title>
    <link rel="icon" type="image/png" href="./solo-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <img src="./solo-logo.png" alt="" />
          </div>
          <div class="brand-copy">
            <span class="brand-name">SOLO</span>
            <span class="brand-meta">Growth OS</span>
          </div>
        </div>

        <nav class="nav-list" id="nav-list"></nav>

        <div class="business-card">
          <div class="business-card__top">
            <div class="business-avatar" aria-hidden="true">
              <img src="./solo-logo.png" alt="" />
            </div>
            <div class="business-copy">
              <span>Business profile</span>
              <small>Not provided yet</small>
            </div>
          </div>
          <div class="business-card__metric">
            <span>Business Pulse</span>
            <strong>Momentum ↑</strong>
          </div>
          <button type="button" class="sidebar-reset-button" data-demo-action="reset-demo" hidden>Reset Demo</button>
        </div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="topbar-brand-line" id="page-title">SOLO</p>
          </div>
          <div class="topbar-actions" aria-label="Workspace status">
            <button class="icon-button" type="button" aria-label="Paramètres" data-demo-action="open-settings">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Zm8-3.5a7.8 7.8 0 0 0-.09-1.2l2.02-1.57-2-3.46-2.38.96a8.24 8.24 0 0 0-2.07-1.2L15.12 3h-4l-.36 2.53a8.24 8.24 0 0 0-2.07 1.2l-2.38-.96-2 3.46 2.02 1.57a7.8 7.8 0 0 0 0 2.4L4.31 14.77l2 3.46 2.38-.96a8.24 8.24 0 0 0 2.07 1.2l.36 2.53h4l.36-2.53a8.24 8.24 0 0 0 2.07-1.2l2.38.96 2-3.46-2.02-1.57c.06-.39.09-.79.09-1.2Z" />
              </svg>
            </button>
            <button class="icon-button" type="button" aria-label="Recherche" data-demo-action="search">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m21 21-4.35-4.35m1.35-5.15a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" />
              </svg>
            </button>
          </div>
        </header>

        <section class="content-stage" id="content-stage" aria-live="polite">
          <div class="solo-home-page" aria-busy="true"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
    <script src="./marketing-lab.js"></script>
  </body>
</html>
